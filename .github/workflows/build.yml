name: Build
run-name: "Build ${{ inputs.tag }}"

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "FFmpeg release tag to build (nX.Y[.Z], n8.1 or newer)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: build-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
      version: ${{ steps.check.outputs.version }}
    env:
      GH_TOKEN: ${{ github.token }}
      TAG: ${{ inputs.tag }}
    steps:
      - name: Validate tag and check for existing release
        id: check
        run: |
          if [[ ! "$TAG" =~ ^n([0-9]+)\.([0-9]+)(\.([0-9]+))?$ ]]; then
            echo "::error::'$TAG' is not a release tag (expected nX.Y[.Z])"
            exit 1
          fi
          NUM=$(( ${BASH_REMATCH[1]} * 10000 + ${BASH_REMATCH[2]} * 100 + ${BASH_REMATCH[4]:-0} ))
          if (( NUM < 80100 )); then
            echo "::error::only n8.1 and above are built"
            exit 1
          fi
          if [[ -z "$(gh api "repos/$GITHUB_REPOSITORY/git/matching-refs/tags/$TAG" --jq '.[] | select(.ref == "refs/tags/'"$TAG"'")')" ]]; then
            echo "::error::tag '$TAG' does not exist in this repository yet; run the 'Sync upstream' workflow first"
            exit 1
          fi
          if gh release view "${TAG#n}" --repo "$GITHUB_REPOSITORY" --json tagName > /dev/null 2>&1; then
            echo "release ${TAG#n} already exists; nothing to do"
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          else
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          fi
          echo "version=${TAG#n}" >> "$GITHUB_OUTPUT"

  build:
    needs: preflight
    if: needs.preflight.outputs.proceed == 'true'
    runs-on: macos-26
    timeout-minutes: 360
    env:
      TAG: ${{ inputs.tag }}
      VERSION: ${{ needs.preflight.outputs.version }}
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Check out FFmpeg source at tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: refs/tags/${{ inputs.tag }}
          fetch-depth: 1

      - name: Install prerequisites
        # cargo-c for rav1e; meson for harfbuzz/dav1d/libvmaf (the build
        # script only uses a python virtualenv for meson if none is native);
        # autotools for libklvanc and other autogen.sh-based libraries,
        # which recent macOS runner images no longer ship
        run: brew install cargo-c meson autoconf automake libtool

      - name: Fetch build script
        run: git clone --depth 1 --branch main https://git.martin-riedl.de/ffmpeg/build-script.git "$RUNNER_TEMP/build-script"

      - name: Point build script at this checkout
        run: |
          # build-ffmpeg.sh normally downloads a release tarball from ffmpeg.org;
          # feed it an identical-shaped tarball generated from this repository instead
          git archive --prefix=ffmpeg/ HEAD > "$RUNNER_TEMP/ffmpeg.tar"
          # official tarballs carry a VERSION file that ffbuild/version.sh reads
          mkdir -p "$RUNNER_TEMP/stage/ffmpeg"
          echo "$VERSION" > "$RUNNER_TEMP/stage/ffmpeg/VERSION"
          tar -rf "$RUNNER_TEMP/ffmpeg.tar" -C "$RUNNER_TEMP/stage" ffmpeg/VERSION
          bzip2 "$RUNNER_TEMP/ffmpeg.tar"

          SCRIPT="$RUNNER_TEMP/build-script/script/build-ffmpeg.sh"
          sed -i '' 's|download https://ffmpeg.org/releases/.* "ffmpeg.tar.bz2"|cp "$FFMPEG_TARBALL" "ffmpeg.tar.bz2"|' "$SCRIPT"
          grep -q 'FFMPEG_TARBALL' "$SCRIPT"
          sed -i '' "s|EXTRA_VERSION=\".*\"|EXTRA_VERSION=\"$GITHUB_REPOSITORY\"|" "$SCRIPT"

          # skip openJPEG's CLI tools: their link breaks when cmake picks up
          # the runner image's Homebrew lcms2 headers; ffmpeg only needs the lib
          OJP="$RUNNER_TEMP/build-script/script/build-openjpeg.sh"
          sed -i '' 's|-DBUILD_SHARED_LIBS=OFF ../openjpeg-|-DBUILD_SHARED_LIBS=OFF -DBUILD_CODEC:BOOL=OFF ../openjpeg-|' "$OJP"
          grep -q 'BUILD_CODEC' "$OJP"

          # libvorbis 1.3.7's configure passes -force_cpusubtype_ALL, which
          # Xcode 15+ ld rejects; strip it before configure runs (same fix
          # Homebrew applies)
          LV="$RUNNER_TEMP/build-script/script/build-libvorbis.sh"
          sed -i '' 's|^\./configure |sed -i.orig "s/-force_cpusubtype_ALL//g" configure \&\& ./configure |' "$LV"
          grep -q 'force_cpusubtype_ALL' "$LV"

          # libbluray's internal dec_init collides with the same symbol in
          # ffmpeg's fftools when linking statically; merge the archive and
          # demote the clashing symbol to a private extern (an export-only
          # allowlist would fail on symbols already hidden at compile time)
          LB="$RUNNER_TEMP/build-script/script/build-libbluray.sh"
          cat >> "$LB" <<'PATCH'

          cd "$TOOL_DIR/lib"
          checkStatus $? "change directory failed"
          cc -nostdlib -r -Wl,-all_load,libbluray.a -Wl,-unexported_symbol,_dec_init -o libbluray-merged.o
          checkStatus $? "libbluray symbol hiding failed"
          rm libbluray.a
          ar rcs libbluray.a libbluray-merged.o
          checkStatus $? "libbluray repack failed"
          rm libbluray-merged.o
          PATCH
          tail -n 3 "$LB" | grep -q 'libbluray-merged'

      - name: Build
        env:
          FFMPEG_TARBALL: ${{ runner.temp }}/ffmpeg.tar.bz2
        run: |
          mkdir "$RUNNER_TEMP/compile"
          cd "$RUNNER_TEMP/compile"
          "$RUNNER_TEMP/build-script/build.sh" -SKIP_BUNDLE=YES

      - name: Print logs on failure
        if: failure()
        run: |
          if [ ! -d "$RUNNER_TEMP/compile/log" ]; then
            echo "no build logs (failure happened before the build started)"
            exit 0
          fi
          for f in "$RUNNER_TEMP"/compile/log/*.log; do
            echo "::group::$(basename "$f")"
            tail -n 100 "$f"
            echo "::endgroup::"
          done

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: build-logs-${{ inputs.tag }}
          path: ${{ runner.temp }}/compile/log/

      - name: Verify and stage binaries
        run: |
          BIN="$RUNNER_TEMP/compile/out/bin"
          "$BIN/ffmpeg" -version
          "$BIN/ffprobe" -version
          "$BIN/ffplay" -version
          mkdir "$RUNNER_TEMP/dist"
          for b in ffmpeg ffprobe ffplay; do
            cp "$BIN/$b" "$RUNNER_TEMP/dist/$b-$VERSION-macos-arm64"
          done
          cd "$RUNNER_TEMP/dist"
          tar -czf "ffmpeg-$VERSION-macos-arm64.tar.gz" ./*-macos-arm64
          shasum -a 256 ./* > SHA256SUMS.txt

      - name: Create release
        run: |
          {
            echo "Static FFmpeg, FFprobe and FFplay binaries for macOS on Apple Silicon (arm64),"
            echo "built from tag \`$TAG\` with [martin-riedl.de build-script](https://git.martin-riedl.de/ffmpeg/build-script)."
            echo
            echo "The binaries are not code-signed; after downloading run:"
            echo '```'
            echo "xattr -d com.apple.quarantine ffmpeg-$VERSION-macos-arm64"
            echo "chmod +x ffmpeg-$VERSION-macos-arm64"
            echo '```'
          } > "$RUNNER_TEMP/notes.md"
          # release is tagged X.Y.Z (no n prefix); that tag doesn't exist yet,
          # so pin it to the commit of the source tag we built
          gh release create "$VERSION" \
            --target "$(git rev-parse HEAD)" \
            --title "FFmpeg $VERSION (macOS Apple Silicon)" \
            --notes-file "$RUNNER_TEMP/notes.md" \
            "$RUNNER_TEMP"/dist/*
